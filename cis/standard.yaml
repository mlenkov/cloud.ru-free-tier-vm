# CIS Debian 12 Level 1 Server Configuration
# Для GitVerse DevOps AI Employee

cis_version: "Debian 12 Level 1 v1.1.0"
compliance_target: 95
compliance_critical_threshold: 80

# Общие настройки
settings:
  backup_enabled: true
  backup_retention_days: 30
  log_level: INFO
  dry_run: false

# Категории проверок
checks:
  # Целостность
  integrity:
    - cis_id: "1.3.1"
      description: "AIDE установлен"
      required: true
      fix_command: "apt install aide aide-common"

  # Core dumps
  coredumps:
    - cis_id: "1.4.1"
      description: "Core dumps отключены"
      required: true

  # ASLR
  aslr:
    - cis_id: "1.5.1"
      description: "ASLR включён"
      required: true
    - cis_id: "1.5.2"
      description: "Prelink удалён"
      required: true

  # AppArmor
  apparmor:
    - cis_id: "1.6.1"
      description: "AppArmor включён"
      required: true

  # Баннеры
  banners:
    - cis_id: "1.7.1"
      description: "/etc/issue содержит предупреждение"
      required: true
    - cis_id: "1.7.2"
      description: "/etc/issue.net содержит предупреждение"
      required: true

  # Синхронизация времени
  timesync:
    - cis_id: "2.1.1"
      description: "Chrony установлен"
      required: true

  # Сервисы
  services:
    - cis_id: "2.2.1"
      description: "Avahi не установлен"
      required: true
    - cis_id: "2.2.2"
      description: "CUPS не установлен"
      required: true
    - cis_id: "2.2.3"
      description: "DHCP сервер не установлен"
      required: true
    - cis_id: "2.2.4"
      description: "DNS сервер не установлен"
      required: true
    - cis_id: "2.2.5"
      description: "FTP сервер не установлен"
      required: true
    - cis_id: "2.2.6"
      description: "HTTP сервер не установлен"
      required: true
    - cis_id: "2.2.7"
      description: "IMAP/POP3 сервер не установлен"
      required: true
    - cis_id: "2.2.8"
      description: "LDAP сервер не установлен"
      required: true
    - cis_id: "2.2.9"
      description: "Mail сервер не установлен"
      required: true
    - cis_id: "2.2.10"
      description: "NFS сервер не установлен"
      required: true
    - cis_id: "2.2.11"
      description: "RPC bind не установлен"
      required: true
    - cis_id: "2.2.12"
      description: "RSync сервер не установлен"
      required: true
    - cis_id: "2.2.13"
      description: "Samba не установлен"
      required: true
    - cis_id: "2.2.14"
      description: "SNMP сервер не установлен"
      required: true
    - cis_id: "2.2.15"
      description: "TFTP сервер не установлен"
      required: true
    - cis_id: "2.2.16"
      description: "X Window System не установлен"
      required: true

  # Сеть
  network:
    - cis_id: "3.1"
      description: "IP forwarding отключен"
      required: true
      fix_command: "sysctl net.ipv4.ip_forward=0"
    - cis_id: "3.2"
      description: "Packet redirect sending отключен"
      required: true
      fix_command: "sysctl net.ipv4.conf.all.send_redirects=0"
    - cis_id: "3.3"
      description: "Source routed packets отключены"
      required: true
      fix_command: "sysctl net.ipv4.conf.all.accept_source_route=0"
    - cis_id: "3.4"
      description: "ICMP redirects отключены"
      required: true
      fix_command: "sysctl net.ipv4.conf.all.accept_redirects=0"
    - cis_id: "3.5"
      description: "Reverse path filtering включен"
      required: true
      fix_command: "sysctl net.ipv4.conf.all.rp_filter=1"
    - cis_id: "3.6"
      description: "Suspicious packets logging включен"
      required: true
      fix_command: "sysctl net.ipv4.conf.all.log_martians=1"

  # Логирование
  logging:
    - cis_id: "4.1.1"
      description: "journald persistent storage"
      required: true

  # Cron / Аccess
  cron:
    - cis_id: "5.1.1"
      description: "Cron/At ограничены (allow)"
      required: true

  # SSH Security
  ssh:
    - cis_id: "5.2"
      description: "SSH: вход root отключен"
      required: true
      fix_command: "PermitRootLogin no"
    - cis_id: "5.3"
      description: "SSH: MaxAuthTries <= 4"
      required: true
      fix_command: "MaxAuthTries 3"
    - cis_id: "5.4"
      description: "SSH: IgnoreRhosts включен"
      required: true
      fix_command: "IgnoreRhosts yes"
    - cis_id: "5.5"
      description: "SSH: HostBasedAuthentication отключен"
      required: true
      fix_command: "HostBasedAuthentication no"
    - cis_id: "5.6"
      description: "SSH: PermitEmptyPasswords отключен"
      required: true
      fix_command: "PermitEmptyPasswords no"
    - cis_id: "5.7"
      description: "SSH: X11Forwarding отключен"
      required: true
      fix_command: "X11Forwarding no"

  # PAM
  pam:
    - cis_id: "5.8.1"
      description: "pwquality настроен"
      required: true
    - cis_id: "5.8.2"
      description: "SHA512 для паролей"
      required: true

  # Файловые права + password policy
  file_permissions:
    - cis_id: "6.1.1"
      description: "/etc/passwd права = 644"
      required: true
    - cis_id: "6.1.2"
      description: "/etc/shadow права <= 640"
      required: true
    - cis_id: "6.1.3"
      description: "/etc/group права = 644"
      required: true
    - cis_id: "6.1.4"
      description: "/etc/gshadow права <= 640"
      required: true
    - cis_id: "6.1.5"
      description: "/etc/passwd- права = 644"
      required: true
    - cis_id: "6.1.6"
      description: "/etc/shadow- права <= 640"
      required: true
    - cis_id: "6.1.7"
      description: "/etc/group- права = 644"
      required: true
    - cis_id: "6.1.8"
      description: "/etc/gshadow- права <= 640"
      required: true
    - cis_id: "6.1.9"
      description: "/etc/ssh/sshd_config права <= 600"
      required: true
    - cis_id: "6.1.10"
      description: "PASS_MAX_DAYS <= 365"
      required: true
    - cis_id: "6.1.11"
      description: "PASS_MIN_DAYS >= 1"
      required: true
    - cis_id: "6.1.12"
      description: "UMASK >= 027"
      required: true
    - cis_id: "6.1.13"
      description: "INACTIVE lock <= 30 days"
      required: true

  # Fail2ban
  fail2ban:
    - cis_id: "8.1"
      description: "Fail2ban установлен и запущен"
      required: true
    - cis_id: "8.2"
      description: "Fail2ban: SSH защита активна"
      required: true
    - cis_id: "8.3"
      description: "Fail2ban: бан после 3 попыток"
      required: true

  # Обновления
  updates:
    - cis_id: "9.1"
      description: "Unattended-upgrades установлен"
      required: true
    - cis_id: "9.2"
      description: "Unattended-upgrades настроен"
      required: true
    - cis_id: "10.1"
      description: "Needrestart установлен"
      required: true

# Секреты (из Bitwarden Secrets Manager)
secrets:
  required:
    - name: "s3_access_key"
      secret_key: "cloudru/s3/access_key"
      description: "S3 Access Key (tenant-id:access-key)"
    - name: "s3_secret_key"
      secret_key: "cloudru/s3/secret_key"
      description: "S3 Secret Key"
    - name: "s3_bucket"
      secret_key: "cloudru/s3/bucket"
      description: "S3 bucket name"
    - name: "s3_endpoint"
      secret_key: "cloudru/s3/endpoint"
      description: "S3 endpoint URL"
    - name: "ya_disk_token"
      secret_key: "yandex/disk/token"
      description: "Yandex Disk OAuth token"
    - name: "restic_password"
      secret_key: "restic/password"
      description: "Restic encryption password"

# Скрипты автоматизации
scripts:
  docs_generation:
    - "deploy/docs_generator.py"

# Уведомления
notifications:
  on_failure:
    - "slack"
  on_success:
    - "slack"
