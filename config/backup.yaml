# Backup 3-2-1 Configuration
# Copy 1: Local   — /var/backups/<project>
# Copy 2: Offsite — cloud.ru S3 Object Storage (config via BSM)
# Copy 3: Remote  — Yandex Disk (config via BSM)

backup:
  strategy: 3-2-1

  # Что бекапим
  sources:
    - /etc
    - /home
    - /var/www
    - /var/log
    - /root

  # Локальное хранилище (restic)
  local_path: /var/backups/cloud.ru-free-tier-vm

  # Расписание (cron)
  schedule: "0 2 * * *"

  # Retention политика
  retention:
    keep_daily: 7
    keep_weekly: 4
    keep_monthly: 3
    keep_yearly: 1

  # S3, Yandex Disk настройки — через BSM
  # cloudru/s3/bucket, cloudru/s3/endpoint, yandex/disk/token
  # prefix определяется автоматически: hostname -f
