# Backup 3-2-1 Configuration
# Несекретные настройки — в этом файле.
# Credentials (access_key, secret_key, token) — в BSM / .env.

backup:
  strategy: 3-2-1

  # Что бекапим — добавляй новые сервисы сюда
  sources:
    - /etc
    - /home
    - /var/www
    - /var/log
    - /root

  # Локальное хранилище (restic)
  local_path: /var/backups/cloud.ru-free-tier-vm

  # Расписание (cron)
  schedule: "0 2 * * *"

  # Retention политика
  retention:
    keep_daily: 7
    keep_weekly: 4
    keep_monthly: 3
    keep_yearly: 1

  # cloud.ru S3 Object Storage
  s3:
    bucket: ""                    # имя бакета
    endpoint: ""                  # URL endpoint (без https://)
    prefix: ""                    # префикс ключей внутри бакета (опционально)
    region: ru-central-1

  # Yandex Disk
  yandex_disk:
    path: /backups/cloud.ru-free-tier-vm   # удалённый путь
