# GitHub Actions Pipeline for VPS Fortify
# AI Employee автоматически настраивает сервер под CIS стандарты
# Запускается при пуше в main или по расписанию

name: VPS Fortify Deploy

on:
  push:
    branches: [main, develop]
  schedule:
    - cron: "0 2 * * *"   # Ежедневно в 2:00
  workflow_dispatch:        # Ручной запуск

env:
  CIS_TARGET: 95
  BW_ACCESS_TOKEN: ${{ secrets.BW_ACCESS_TOKEN }}

jobs:
  setup:
    name: Setup & Harden
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          sudo apt-get update && sudo apt-get install -y restic

      - name: Sync secrets from Bitwarden
        run: python3 deploy/secrets.py sync
        env:
          BW_ACCESS_TOKEN: ${{ secrets.BW_ACCESS_TOKEN }}
          BW_ORG_ID: ${{ secrets.BW_ORG_ID }}

      - name: Run CIS audit
        run: python3 cis/manager.py audit --format json

      - name: Apply CIS fixes
        run: python3 cis/manager.py fix --force

      - name: Re-audit after fixes
        run: python3 cis/manager.py audit --format json --output cis/data/audit_after_fix.json

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: audit-report
          path: cis/data/
          retention-days: 30

  verify:
    name: Verify Compliance
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download audit report
        uses: actions/download-artifact@v4
        with:
          name: audit-report
          path: cis/data/

      - name: Check compliance score
        run: python3 cis/check_compliance.py --threshold ${{ env.CIS_TARGET }}

  backup:
    name: Create 1-2-1 Backup
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          sudo apt-get update && sudo apt-get install -y restic

      - name: Sync secrets
        run: python3 deploy/secrets.py sync
        env:
          BW_ACCESS_TOKEN: ${{ secrets.BW_ACCESS_TOKEN }}
          BW_ORG_ID: ${{ secrets.BW_ORG_ID }}

      - name: Create backup
        run: python3 backup/backup.py create
        env:
          RESTIC_PASSWORD: ${{ secrets.RESTIC_PASSWORD }}

  docs:
    name: Generate Documentation
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download audit report
        uses: actions/download-artifact@v4
        with:
          name: audit-report
          path: cis/data/

      - name: Generate README
        run: python3 deploy/docs_generator.py

      - name: Commit documentation
        run: |
          git config --global user.name "AI Employee"
          git config --global user.email "devops@cloud.ru-free-tier-vm"
          git add README.md
          git commit -m "docs: update README with latest CIS audit results" || echo "No changes"
          git push
