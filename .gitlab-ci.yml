# GitVerse CI/CD Pipeline for VPS Fortify
# AI Employee автоматически настраивает сервер под CIS стандарты

stages:
  - setup
  - verify
  - backup
  - docs

variables:
  # Настройки Bitwarden
  BW_SESSION: "${BW_SESSION}"
  # Настройки GitVerse
  GIT_VERSE_URL: "https://gitverse.ru"
  # Настройки CIS
  CIS_TARGET: "95"
  CIS_VERSION: "Debian 12 Level 1"

# Стадия настройки сервера
setup:
  stage: setup
  script:
    - echo "🚀 Starting GitVerse DevOps setup..."
    - echo "📥 Downloading CIS configuration from GitVerse..."
    - mkdir -p config
    # Загрузка конфигурации CIS
    - python3 scripts/download_config.py
    - echo "🔧 Applying CIS standards..."
    - python3 cis_manager.py audit --format json
    - python3 cis_manager.py fix --force
    - echo "✅ CIS standards applied"
  artifacts:
    paths:
      - cis_data/
    expire_in: 1 week
  only:
    - main
    - develop
    - feature/*

# Стадия верификации
verify:
  stage: verify
  script:
    - echo "🔍 Running CIS verification audit..."
    - python3 cis_manager.py audit --format json --output audit-report.json
    - echo "📊 Generating compliance report..."
    - python3 scripts/docs_generator.py
  artifacts:
    reports:
      junit: audit-report.json
    paths:
      - audit-report.json
    expire_in: 1 week
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: always
    - if: '$CI_COMMIT_BRANCH == "develop"'
      when: always
    - if: '$CI_COMMIT_BRANCH =~ /^feature\//'
      when: on_success

# Стадия создания backup
backup:
  stage: backup
  script:
    - echo "💾 Creating 3-2-1 backup..."
    - pip install -r requirements.txt
    - apt-get update && apt-get install -y restic rclone
    - python3 scripts/secrets.py sync
    - python3 scripts/backup.py create
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: on_success

# Стадия генерации документации
docs:
  stage: docs
  script:
    - echo "📝 Generating documentation..."
    - python3 scripts/docs_generator.py
    - echo "💾 Updating README.md..."
    - git config --global user.email "devops@vps-fortify.com"
    - git config --global user.name "AI Employee"
    - git add README.md
    - git commit -m "docs: update README with latest CIS audit results" || echo "No changes to commit"
    - git push origin main
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: on_success
    - if: '$CI_COMMIT_BRANCH == "develop"'
      when: on_success

# Мерж-пайплайн (предотвращение мержа с низким compliance)
merge_check:
  stage: verify
  script:
    - echo "⚠️ Checking compliance score..."
    - python3 scripts/check_compliance.py --threshold 95
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always
  allow_failure: false
